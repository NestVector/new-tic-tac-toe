<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Kids Game Zone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<!-- Full-screen confetti overlay -->
<div id="confetti-container" aria-hidden="true"></div>

<!-- Tab Navigation -->
<nav id="tab-bar">
    <button class="tab-btn active" data-tab="snl" id="tab-snl">🎲 <span id="tab-snl-label">Creatures &amp; Ladders</span></button>
    <button class="tab-btn" data-tab="ttt" id="tab-ttt">❌ Tic-Tac-Toe</button>
</nav>

<main id="main-content">

    <!-- CREATURES & LADDERS PANEL -->
    <div id="snl-panel" class="tab-panel">

        <!-- Setup Screen -->
        <div id="snl-setup">
            <h1 class="kids-title" id="snl-main-title">🎲 Creatures &amp; Ladders</h1>

            <div class="setup-card">
                <h2 class="setup-heading">Choose the hazard! 🎯</h2>
                <div id="animal-options" role="group" aria-label="Hazard animal">
                    <button class="animal-btn active" data-animal="frog" aria-pressed="true">🐸<br><span>Frogs</span></button>
                    <button class="animal-btn" data-animal="snake" aria-pressed="false">🐍<br><span>Snakes</span></button>
                    <button class="animal-btn" data-animal="dino" aria-pressed="false">🦕<br><span>Dinos</span></button>
                    <button class="animal-btn" data-animal="fox" aria-pressed="false">🦊<br><span>Foxes</span></button>
                    <button class="animal-btn" data-animal="croc" aria-pressed="false">🐊<br><span>Crocs</span></button>
                </div>
            </div>

            <div class="setup-card">
                <h2 class="setup-heading">How many players? 👥</h2>
                <div id="player-count-selector" role="group" aria-label="Player count">
                    <button class="count-btn" data-count="2" aria-pressed="false">2</button>
                    <button class="count-btn active" data-count="3" aria-pressed="true">3</button>
                    <button class="count-btn" data-count="4" aria-pressed="false">4</button>
                </div>
            </div>

            <div class="setup-card">
                <h2 class="setup-heading">Player Names 📝</h2>
                <div id="snl-player-configs"></div>
            </div>

            <button id="snl-start-btn" class="big-btn">🚀 Let's Play!</button>
        </div>

        <!-- Game Screen -->
        <div id="snl-game-screen" class="hidden">

            <div id="snl-game-header">
                <h2 id="snl-turn-display">Player 1's Turn!</h2>
                <p id="snl-message" aria-live="polite"></p>
            </div>

            <div id="snl-board-container" aria-label="Game board">
                <div id="snl-board"></div>
                <svg id="snl-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
                <div id="snl-tokens" aria-hidden="true"></div>
            </div>

            <div id="snl-dice-section">
                <div id="snl-dice" role="img" aria-label="Dice">⚀</div>
                <button id="snl-roll-btn" class="big-btn">🎲 Roll!</button>
            </div>

            <div id="snl-players-status"></div>

            <button id="snl-back-btn" class="secondary-btn">← New Setup</button>
        </div>
    </div>

    <!-- TIC-TAC-TOE PANEL -->
    <div id="ttt-panel" class="tab-panel hidden">
        <div id="game">
            <div class="top-bar">
                <button id="mp-btn">Multiplayer</button>
                <button id="mode">Switch to AI Mode</button>
                <button id="settings-btn">Settings</button>
            </div>

            <h1 class="game-title">Tic Tac Toe</h1>

            <div class="scoreboard">
                <div class="score-item score-x">
                    <span class="score-label" id="score-label-x">Player X</span>
                    <span class="score-value" id="score-x">0</span>
                </div>
                <div class="score-item score-draw">
                    <span class="score-label">Draws</span>
                    <span class="score-value" id="score-draw">0</span>
                </div>
                <div class="score-item score-o">
                    <span class="score-label" id="score-label-o">Player O</span>
                    <span class="score-value" id="score-o">0</span>
                </div>
            </div>

            <div id="status"></div>

            <div class="board" id="board">
                <div class="cell" data-cell-index="0" tabindex="0"></div>
                <div class="cell" data-cell-index="1" tabindex="0"></div>
                <div class="cell" data-cell-index="2" tabindex="0"></div>
                <div class="cell" data-cell-index="3" tabindex="0"></div>
                <div class="cell" data-cell-index="4" tabindex="0"></div>
                <div class="cell" data-cell-index="5" tabindex="0"></div>
                <div class="cell" data-cell-index="6" tabindex="0"></div>
                <div class="cell" data-cell-index="7" tabindex="0"></div>
                <div class="cell" data-cell-index="8" tabindex="0"></div>
                <div id="win-line" class="win-line" aria-hidden="true"></div>
            </div>

            <div class="action-bar">
                <button id="reset">New Game</button>
                <button id="undo" disabled>Undo</button>
                <button id="reset-scores">Reset Scores</button>
            </div>
        </div>
    </div>

</main>

<!-- Multiplayer Overlay -->
<div id="mp-overlay" class="hidden">
    <div id="mp-panel" role="dialog" aria-modal="true" aria-labelledby="mp-heading">
        <h2 id="mp-heading">Multiplayer</h2>
        <div id="mp-lobby">
            <button id="mp-create">Create Game</button>
            <div class="mp-or">— or —</div>
            <div class="mp-join-row">
                <input type="text" id="mp-code-input" placeholder="Enter room code" maxlength="6" autocomplete="off">
                <button id="mp-join">Join</button>
            </div>
        </div>
        <div id="mp-waiting" class="hidden">
            <p class="mp-label">Share this code with your opponent:</p>
            <div class="mp-code-box">
                <span id="mp-room-code">—</span>
                <button id="mp-copy">Copy</button>
            </div>
            <p id="mp-hint" class="mp-hint-text"></p>
        </div>
        <p id="mp-status-text" class="mp-status"></p>
        <button id="mp-close">Close</button>
    </div>
</div>

<!-- Settings Overlay -->
<div id="settings-overlay" class="hidden">
    <div id="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-heading">
        <h2 id="settings-heading">Settings</h2>
        <div class="setting-row">
            <label for="dark-mode-toggle">Dark Mode</label>
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-row">
            <label for="difficulty-select">AI Difficulty</label>
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <div class="setting-row name-row">
            <label for="player-x-name">Player X Name</label>
            <input type="text" id="player-x-name" maxlength="16" autocomplete="off">
        </div>
        <div class="setting-row name-row">
            <label for="player-o-name">Player O Name</label>
            <input type="text" id="player-o-name" maxlength="16" autocomplete="off">
        </div>
        <button id="settings-close">Close</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
