<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <div class="top-bar">
            <button id="mode">Switch to AI Mode</button>
            <button id="settings-btn">Settings</button>
        </div>

        <h1 class="game-title">Tic Tac Toe</h1>

        <div class="scoreboard">
            <div class="score-item score-x">
                <span class="score-label">Player X</span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score-item score-draw">
                <span class="score-label">Draws</span>
                <span class="score-value" id="score-draw">0</span>
            </div>
            <div class="score-item score-o">
                <span class="score-label">Player O</span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </div>

        <div id="status"></div>

        <div class="board" id="board">
            <div class="cell" data-cell-index="0"></div>
            <div class="cell" data-cell-index="1"></div>
            <div class="cell" data-cell-index="2"></div>
            <div class="cell" data-cell-index="3"></div>
            <div class="cell" data-cell-index="4"></div>
            <div class="cell" data-cell-index="5"></div>
            <div class="cell" data-cell-index="6"></div>
            <div class="cell" data-cell-index="7"></div>
            <div class="cell" data-cell-index="8"></div>
        </div>

        <div class="action-bar">
            <button id="reset">New Game</button>
            <button id="reset-scores">Reset Scores</button>
        </div>
    </div>

    <div id="settings-overlay" class="hidden">
        <div id="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-heading">
            <h2 id="settings-heading">Settings</h2>
            <div class="setting-row">
                <label for="dark-mode-toggle">Dark Mode</label>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <button id="settings-close">Close</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
